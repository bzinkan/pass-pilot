<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>PassPilot - Hall Pass Management</title>
    <meta name="description" content="Digital hall pass management system for schools. Track student movements in real-time." />

    <!-- Prevent aggressive caching -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Icon -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>"
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PassPilot" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="PassPilot" />
  </head>
  <body>
    <div id="root"></div>

    <!-- TEMP: surface first runtime error instead of a blank page -->
    <script>
      window.addEventListener("error", (e) => {
        const box = document.createElement("pre");
        box.style.cssText =
          "white-space:pre-wrap;padding:16px;margin:16px;border:1px solid #f00;background:#fff;color:#000;font-family:monospace";
        box.textContent =
          "Client error: " +
          (e.message || e.error) +
          "\n" +
          (e.error && e.error.stack ? e.error.stack : "");
        document.body.prepend(box);
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>
    <!-- Replit dev banner when opened outside the Replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
